<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill System - History Click</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #4a148c; --secondary: #006064; --text-black: #121212; --bg: #dfe6e9; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        
        .input-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; margin-bottom: 30px; }
        .input-card h2 { color: var(--primary); text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; border: 2px solid #ced4da; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; font-family: 'Kanit'; }
        
        /* ใบเสร็จ */
        #receipt-area { background: white; width: 380px; border-radius: 25px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.25); display: none; margin-bottom: 20px; }
        .receipt-banner { background: linear-gradient(90deg, var(--primary), var(--secondary)); height: 18px; }
        .receipt-body { padding: 40px; text-align: center; }
        .logo-text { font-family: 'Montserrat'; font-weight: 700; font-size: 34px; color: var(--primary); }
        .user-name { font-weight: 600; font-size: 26px; color: var(--text-black); margin-top: 15px; }
        .details-list { background: #f1f3f5; padding: 22px; border-radius: 15px; margin: 25px 0; text-align: left; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #dee2e6; font-size: 14px; }
        .total-box { background: #e0f2f1; border: 2px solid #80cbc4; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .total-val { font-family: 'Montserrat'; font-size: 30px; font-weight: 700; color: var(--primary); }

        /* ตารางประวัติ */
        .history-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 650px; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .history-table th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        .history-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .clickable-name { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: underline; }
        .btn-del { color: #d32f2f; cursor: pointer; border: none; background: none; font-weight: 600; }

        .btn-action { width: 100%; padding: 14px; border-radius: 50px; border: none; font-weight: 600; cursor: pointer; font-family: 'Kanit'; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-excel { background: #1f7244; color: white; }
    </style>
</head>
<body>

    <div class="input-card">
        <h2>⚡ ข้อมูลค่าไฟฟ้า</h2>
        <input type="text" id="userName" placeholder="ชื่อลูกค้า">
        <input type="number" id="prevUnit" placeholder="เลขมิเตอร์ครั้งก่อน">
        <input type="number" id="currUnit" placeholder="เลขมิเตอร์ครั้งนี้">
        <input type="number" id="rate" value="5.00" step="0.1">
        <button class="btn-primary btn-action" onclick="generateBill()">ออกใบเสร็จ</button>
    </div>

    <div id="receipt-area">
        <div class="receipt-banner"></div>
        <div class="receipt-body">
            <div class="logo-text">INVOICE</div>
            <div style="background:#2e7d32; color:white; display:inline-block; padding:4px 15px; border-radius:20px; font-size:12px; margin:10px 0;">PAID</div>
            <div class="user-name" id="resName">-</div>
            <div style="font-weight:600; font-size:14px; color:#666;">#INV-6942</div>
            <div class="details-list">
                <div class="detail-row"><span>เลขมิเตอร์ครั้งก่อน</span><span id="resPrev">0</span></div>
                <div class="detail-row"><span>เลขมิเตอร์ครั้งนี้</span><span id="resCurr">0</span></div>
                <div class="detail-row"><span>ยอดใช้ไฟฟ้า</span><span id="resUnitUsed">0 หน่วย</span></div>
                <div class="detail-row"><span>ราคาต่อหน่วย</span><span>฿<span id="resRate">0.00</span></span></div>
            </div>
            <div class="total-box">
                <span style="font-weight:600; color:var(--secondary);">รวมเงินสุทธิ</span>
                <span class="total-val">฿<span id="resGrand">0.00</span></span>
            </div>
            <div style="margin-top:30px; font-size:13px; color:#333;">
                ออกบิลเมื่อ: 19 ก.พ. 2569 | 20:10 น.<br>
                <b style="color:var(--primary); font-size:18px; display:block; margin-top:10px;">✨ ขอบคุณที่ใช้บริการ ✨</b>
            </div>
        </div>
        <button class="btn-primary btn-action" onclick="downloadImage()" style="border-radius:0;">📥 ดาวน์โหลดใบเสร็จ (.PNG)</button>
    </div>

    <div class="history-card">
        <h3 style="margin-top:0; color:var(--primary);">📋 ประวัติลูกค้าทุกคน</h3>
        <button class="btn-excel btn-action" onclick="exportToExcel()">📊 ส่งออกไฟล์: ข้อมูลค่าไฟ.xlsx</button>
        <table class="history-table">
            <thead>
                <tr>
                    <th>ลำดับ</th>
                    <th>ชื่อ (กดเพื่อดูบิล)</th>
                    <th>หน่วย</th>
                    <th>ยอดเงิน</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        let allCustomerData = JSON.parse(localStorage.getItem('electricityHistory')) || [];
        updateTable();

        function generateBill() {
            const name = document.getElementById('userName').value || "คุณลูกค้า";
            const prev = parseFloat(document.getElementById('prevUnit').value) || 0;
            const curr = parseFloat(document.getElementById('currUnit').value);
            const rate = parseFloat(document.getElementById('rate').value) || 0;

            if (isNaN(curr) || curr < prev) { alert("กรุณากรอกข้อมูลให้ถูกต้อง"); return; }

            const units = curr - prev;
            const total = units * rate;

            const newData = { id: Date.now(), name, prev, curr, units, rate, total };
            allCustomerData.push(newData);
            saveData();
            showReceipt(newData);
            updateTable();
        }

        function showReceipt(data) {
            document.getElementById('resName').innerText = data.name;
            document.getElementById('resPrev').innerText = data.prev.toLocaleString();
            document.getElementById('resCurr').innerText = data.curr.toLocaleString();
            document.getElementById('resUnitUsed').innerText = data.units.toLocaleString() + " หน่วย";
            document.getElementById('resRate').innerText = data.rate.toFixed(2);
            document.getElementById('resGrand').innerText = data.total.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            document.getElementById('receipt-area').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveData() { localStorage.setItem('electricityHistory', JSON.stringify(allCustomerData)); }

        function updateTable() {
            const body = document.getElementById('historyBody');
            body.innerHTML = "";
            allCustomerData.forEach((item, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td class="clickable-name" onclick="viewOldBill(${item.id})">${item.name}</td>
                    <td>${item.units}</td>
                    <td>฿${item.total.toLocaleString()}</td>
                    <td><button class="btn-del" onclick="deleteEntry(${item.id})">ลบ</button></td>
                </tr>`;
                body.innerHTML += row;
            });
        }

        function viewOldBill(id) {
            const data = allCustomerData.find(item => item.id === id);
            if(data) showReceipt(data);
        }

        function deleteEntry(id) {
            if(confirm("ต้องการลบข้อมูลนี้ใช่หรือไม่?")) {
                allCustomerData = allCustomerData.filter(item => item.id !== id);
                saveData();
                updateTable();
            }
        }

        function exportToExcel() {
            if (allCustomerData.length === 0) { alert("ไม่มีข้อมูล"); return; }
            const exportData = allCustomerData.map(({id, ...rest}) => ({
                "ชื่อลูกค้า": rest.name, "เลขมิเตอร์ก่อน": rest.prev, "เลขมิเตอร์หลัง": rest.curr,
                "หน่วยที่ใช้": rest.units, "ราคา/หน่วย": rest.rate, "ยอดเงินสุทธิ": rest.total
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "ข้อมูลค่าไฟ.xlsx");
        }

        function downloadImage() {
            html2canvas(document.getElementById('receipt-area'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Invoice_6942.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
